services:
  payload:
    image: node:22-alpine
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '3000:3000'
      - '9229:9229'
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      NODE_ENV: development
    command: >
      sh -c "
      corepack enable &&
      corepack prepare pnpm@10.5.2 --activate &&
      pnpm install &&
      pnpm dev
      "

volumes:
  node_modules:
